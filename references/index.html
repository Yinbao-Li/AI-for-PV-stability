const CATEGORIES = [...new Set(PAPERS.map(p=>p.c))];

function renderFilterBar() {
    const bar = document.getElementById('filterBar');
    let html = '<button class="filter-btn active" data-cat="all" onclick="filterPapers(\'all\')">All</button>';
    CATEGORIES.forEach(c => {
        html += `<button class="filter-btn" data-cat="${c}" onclick="filterPapers('${c}')">${c}</button>`;
    });
    bar.innerHTML = html;
}

let currentFilter = 'all';
let currentSearch = '';

function renderTable(data) {
    const tbody = document.getElementById('refBody');
    tbody.innerHTML = data.map(p => `
        <tr>
            <td><span class="ref-number" style="display:inline-flex">${p.id}</span></td>
            <td>${p.t}</td>
            <td>${p.a}</td>
            <td>${p.y}</td>
            <td><span class="tag tag-${CATEGORIES.indexOf(p.c)%5+1}">${p.c}</span></td>
        </tr>
    `).join('');
}

function filterPapers(cat) {
    currentFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
    applyFilters();
}

function doSearch() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase();
    applyFilters();
}

function applyFilters() {
    let filtered = PAPERS;
    if (currentFilter !== 'all') filtered = filtered.filter(p => p.c === currentFilter);
    if (currentSearch) filtered = filtered.filter(p => 
        p.t.toLowerCase().includes(currentSearch) || 
        p.a.toLowerCase().includes(currentSearch) ||
        p.c.toLowerCase().includes(currentSearch)
    );
    renderTable(filtered);
}

let sortDir = {};
function sortTable(col) {
    const key = ['id','t','a','y','c'][col];
    sortDir[col] = !(sortDir[col]||false);
    const dir = sortDir[col] ? 1 : -1;
    PAPERS.sort((a,b) => {
        let va = a[key], vb = b[key];
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        return va < vb ? -dir : va > vb ? dir : 0;
    });
    applyFilters();
}

renderFilterBar();
renderTable(PAPERS);
